trigger:
- main

pool:
  vmImage: ubuntu-latest

steps:
- task: TerraformInstaller@1
  inputs:
    terraformVersion: latest

- task: TerraformTaskV4@4
  displayName: Terraform Init
  inputs:
    provider: azurerm
    command: init
    backendServiceArm: Azure-Service-Connection
    backendAzureRmResourceGroupName: terraform-rg
    backendAzureRmStorageAccountName: terraformstate123
    backendAzureRmContainerName: tfstate
    backendAzureRmKey: env.terraform.tfstate

- task: TerraformTaskV4@4
  displayName: Terraform Validate
  inputs:
    provider: azurerm
    command: validate

- task: TerraformTaskV4@4
  displayName: Terraform Plan
  inputs:
    provider: azurerm
    command: plan
    environmentServiceNameAzureRM: github.com_Jasring1212
    commandOptions: "-var-file=dev.tfvars"

- task: TerraformTaskV4@4
  displayName: Terraform Apply
  inputs:
    provider: azurerm
    command: apply
    environmentServiceNameAzureRM: github.com_Jasring1212
    commandOptions: "-auto-approve -var-file=env.tfvars"